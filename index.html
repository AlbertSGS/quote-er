<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renovation Price Calculator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-logo">🏗️</span>
        <div>
          <div class="brand-name">Renovation Estimator</div>
          <div class="brand-sub" id="brand-sub">Interior &amp; Exterior Price Calculator</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="lang-toggle">
          <button class="lang-btn active" id="lang-btn-en" onclick="setLang('en')">EN</button>
          <button class="lang-btn"        id="lang-btn-zh" onclick="setLang('zh')">中文</button>
        </div>
        <button class="btn-ghost"    id="btn-reset"        onclick="resetAll()">Reset</button>
        <button class="btn-primary"  id="btn-print-header" onclick="printQuote()">Print Estimate</button>
      </div>
    </div>
  </header>

  <div class="layout">

    <div class="main-col">
      <div class="tab-bar" id="tab-bar"></div>

      <section class="section">
        <div class="section-title" id="section-select-title">Select Components</div>
        <div class="component-grid" id="component-grid"></div>
      </section>

      <section class="section" id="config-section" style="display:none">
        <div class="section-title" id="section-config-title">Configure Selected Items</div>
        <div id="config-cards"></div>
      </section>
    </div>

    <aside class="summary-col">
      <div class="summary-box">
        <div class="summary-title" id="summary-title">Estimate Summary</div>
        <div id="summary-content">
          <p class="summary-empty-msg">Select components on the left to begin your estimate.</p>
        </div>
      </div>
    </aside>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
  <script src="js/strings.js"></script>
  <script src="js/data.js"></script>
  <script src="js/core.js"></script>
  <script src="js/components/bathroom.js"></script>
  <script src="js/render.js"></script>
  <script src="js/quote.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
